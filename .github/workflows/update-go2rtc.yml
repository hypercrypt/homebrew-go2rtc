name: Update go2rtc formula

on:
  workflow_dispatch:
  schedule:
    # 06:30 UTC daily (06:30 GMT / 07:30 BST)
    - cron: "30 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run updater
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_go2rtc.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Formula/go2rtc.rb 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.update.outputs.version }}"
          BRANCH="update-go2rtc-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add Formula/go2rtc.rb
          git commit -m "Update go2rtc to ${VERSION}"
          git push --force-with-lease origin "$BRANCH"

          # Create PR only if one does not already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create \
              --title "Update go2rtc to ${VERSION}" \
              --body "Automated update of the go2rtc Homebrew formula to [v${VERSION}](https://github.com/AlexxIT/go2rtc/releases/tag/v${VERSION})." \
              --base main
          else
            echo "PR already exists for branch ${BRANCH}, skipping creation."
          fi
